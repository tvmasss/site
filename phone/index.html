<script>

async function loadTags() {
    try {
        const response = await fetch('tags.json');
        const tags = await response.json();
        const container = document.getElementById('tags-container');

        // Набор размеров для создания эффекта облака
        const sizes = [9, 12, 16, 11, 14, 18, 10]; 

        container.innerHTML = tags.map((tag, index) => {
            // Берем размер из списка по очереди (циклично)
            const fontSize = sizes[index % sizes.length];
            
            return `<a href="${tag.href}" 
                       class="tag-cloud-link" 
                       style="font-size: ${fontSize}pt;">${tag.text}</a>`;
        }).join(' ');

    } catch (error) {
        console.error('Ошибка загрузки тегов:', error);
    }
}

loadTags();


</script>
